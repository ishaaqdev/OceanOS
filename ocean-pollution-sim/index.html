<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="3D Ocean Pollution Detection Simulation - A Three.js visualization of factory oil spill and smart buoy pollution detection system" />
  <title>Ocean Pollution Detection Simulator</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="loading-screen">
    <div class="loader-content">
      <div class="loader-ring"></div>
      <h1>Ocean Pollution Simulator</h1>
      <p>Initializing 3D Environment...</p>
    </div>
  </div>

  <div id="error-display" style="display:none; position:fixed; top:10px; left:10px; right:10px; background:rgba(255,0,0,0.8); color:white; z-index:9999; padding:20px; font-family:monospace; border-radius:5px;"></div>
  <script>
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      document.getElementById('error-display').style.display = 'block';
      document.getElementById('error-display').innerHTML += '<br/>ERROR: ' + msg + ' @ ' + lineNo + ':' + columnNo;
      return false;
    };
    window.addEventListener('unhandledrejection', function(event) {
      document.getElementById('error-display').style.display = 'block';
      document.getElementById('error-display').innerHTML += '<br/>PROMISE ERROR: ' + event.reason;
    });
  </script>

  <canvas id="simulation-canvas"></canvas>

  <!-- HUD Overlay -->
  <div id="hud">
    <div id="hud-top">
      <h1 id="hud-title">🌊 Ocean Pollution Detection System</h1>
    </div>

    <div id="alert-panel">
      <div id="alert-indicator">
        <div id="alert-light"></div>
        <span id="alert-status">MONITORING...</span>
      </div>
      <div id="pollution-bar-container">
        <label>Pollution Level</label>
        <div id="pollution-bar">
          <div id="pollution-fill"></div>
        </div>
        <span id="pollution-percent">0%</span>
      </div>
      <div id="stats">
        <div class="stat-item">
          <span class="stat-label">Water Quality</span>
          <span id="stat-quality" class="stat-value good">GOOD</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Oil Detected</span>
          <span id="stat-oil" class="stat-value">0 ppm</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Buoy Status</span>
          <span id="stat-buoy" class="stat-value good">ACTIVE</span>
        </div>
      </div>
    </div>

    <div id="controls-panel">
      <button id="btn-spill" class="control-btn danger">🛢️ Start Oil Spill</button>
      <button id="btn-reset" class="control-btn">🔄 Reset</button>
      <button id="btn-camera" class="control-btn">📷 Buoy View</button>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="main.js?v=4"></script>
</body>
</html>
